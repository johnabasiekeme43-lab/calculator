<html>
    <head>
        <title>JAVASCRIPT LESSONS</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <meta name="robot" content="">
        <link rel="stylesheet" href="java.css">
        <link rel="stylesheet" href="fontawesome/css/all.min.css">
    </head>
    <body>

        <h3 class="rtn"></h3>
        <div class="calculator_container">
            <div class="calculator_frame">
                <h5 class="calculator_name">Aebee's Calculator</h5>
                <div class="calculator_screen">
                    <h3 class="typing"></h3>
                    <h4 class="answer"></h4>
                </div>

                <div class="calculator_btn">
                    <button disabled class="btn ti off_btn">Off</button>
                    <button class="btn ni on_btn">On</button>
                    <button disabled class="btn ni ti action">x</button>
                    <button disabled class="btn ni ti action">+</button>
                    <button disabled class="btn ni ti action">-</button>
                    <button disabled class="btn ni ti action">/</button>
                    <button disabled class="btn ni ti action">*</button>
                    <button disabled class="btn ni ti action">%</button>
                    <button disabled class="btn ni ti action">Exp</button>
                    <button disabled class="btn ni ti action square_root">&#8730</button>
                    <button disabled class="btn ni ti action sin">sin</button>
                    <button disabled class="btn ni ti action cos">cos</button>
                    <button disabled class="btn ni ti action tan">tan</button>
                    <button disabled class="btn ni ti clear" title="clear">C</button>
                    <button disabled class="btn ni ti bkspace" title="Backspace">
                        <i class="fa-solid fa-backspace"></i>
                    </button>
                    <button disabled class="btn ni ti action number">1</button>
                    <button disabled class="btn ni ti action number">2</button>
                    <button disabled class="btn ni ti action number">3</button>
                    <button disabled class="btn ni ti action number">4</button>
                    <button disabled class="btn ni ti action number">5</button>
                    <button disabled class="btn ni ti action number">6</button>
                    <button disabled class="btn ni ti action number">7</button>
                    <button disabled class="btn ni ti action number">8</button>
                    <button disabled class="btn ni ti action number">9</button>
                    <button disabled class="btn ni ti action number">0</button>
                    <button disabled class="btn ni ti action number">00</button>
                    <button disabled class="btn ni ti equalSign">=</button>
                </div>

            </div>
        </div>

        <script src="java.js">
            
        </script>
    </body>
</html>
